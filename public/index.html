<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Budget Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css" integrity="sha384-zCbKRCUGaJDkqS1kPbPd7TveP5iyJE0EjAuZQTgFLD2ylzuqKfdKlfG/eSrtxUkn" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-fQybjgWLrvvRgtW6bFlB7jaZrFsaBXjsOMm/tB9LTS58ONXgqbR9W8oWht/amnpF" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="/css/styles.css">
        <style>
            .main-nav.hide-nav { display: none !important; }
        </style>
</head>
<body>
   
    <button class="menu-icon" id="menu-toggle" aria-label="Open menu" type="button">
        <span class="menu-dash"></span>
        <span class="menu-dash"></span>
        <span class="menu-dash"></span>
    </button>
    <nav class="main-nav" id="side-nav">
        <ul>
            <li><a href="#" class="nav-link">Edit Envelopes</a></li>
            <li><a href="#" class="nav-link" id="add-expense-link">Expenses</a></li>
            <li><a href="#" class="nav-link" id="add-income-link">Income</a></li>
        </ul>
    </nav>
    <header class="main-header">
        <h1>Personal Budget Dashboard</h1>
        <p>Track and manage your envelopes</p>
    </header>
        <main class="main-content">
                <section class="dashboard-section">
                        <div class="form-card">
                                <h2>Add Envelope</h2>
                                <form onsubmit="event.preventDefault(); addEnvelope();">
                                        <label for="envelope-name">Envelope Name</label>
                                        <input type="text" id="envelope-name" placeholder="e.g. Groceries">
                                        <label for="envelope-amount">Budget Amount</label>
                                        <input type="text" id="envelope-amount" placeholder="e.g. 100">
                                        <span class="amounterror">Please enter a valid number</span>
                                        <button id="add-envelope-button" type="submit">Add Envelope</button>
                                </form>
                        </div>
                        <div class="envelope-list-card">
                                <h2>Envelopes</h2>
                                <ul id="envelope-list"></ul>
                        </div>
                </section>
        </main>
        <!-- Modal for editing/deleting envelopes -->
        <div class="modal fade" id="editEnvelopesModal" tabindex="-1" role="dialog" aria-labelledby="editEnvelopesModalLabel" aria-hidden="true">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="editEnvelopesModalLabel">Edit Envelopes</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body">
                        <ul id="modal-envelope-list" class="list-group"></ul>
                    </div>
                </div>
            </div>
        </div>
    <footer class="main-footer">
        <span>&copy; 2026 Personal Budget App</span>
    </footer>
    <span id="custom-tooltip"></span>
            <!-- Clean Bootstrap Expense Modal -->
            <div class="modal fade" id="addExpenseModal" tabindex="-1" role="dialog" aria-labelledby="addExpenseModalLabel" aria-hidden="true">
                <div class="modal-dialog" role="document">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="addExpenseModalLabel">Add Expense</h5>
                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                        <div class="modal-body">
                            <form id="expense-form">
                                <div class="form-group">
                                    <label for="expense-detail">Detail</label>
                                    <input type="text" class="form-control" id="expense-detail" placeholder="e.g. Coffee">
                                </div>
                                <div class="form-group">
                                    <label for="expense-amount">Amount</label>
                                    <input type="number" class="form-control" id="expense-amount" placeholder="e.g. 3.50">
                                </div>
                                <div class="form-group">
                                    <label for="expense-envelope">Envelope</label>
                                    <select class="form-control" id="expense-envelope">
                                        <option value="">Select envelope</option>
                                        <!-- Envelope options will be populated by JS -->
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-primary">Add Expense</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Bootstrap Income Modal -->
            <div class="modal fade" id="addIncomeModal" tabindex="-1" role="dialog" aria-labelledby="addIncomeModalLabel" aria-hidden="true">
                <div class="modal-dialog" role="document">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="addIncomeModalLabel">Add Income</h5>
                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                        <div class="modal-body">
                            <form id="income-form">
                                <div class="form-group">
                                    <label for="income-detail">Detail</label>
                                    <input type="text" class="form-control" id="income-detail" placeholder="e.g. Paycheck">
                                </div>
                                <div class="form-group">
                                    <label for="income-amount">Amount</label>
                                    <input type="number" class="form-control" id="income-amount" placeholder="e.g. 500">
                                </div>
                                <div class="form-group">
                                    <label for="income-envelope">Envelope</label>
                                    <select class="form-control" id="income-envelope">
                                        <option value="">Select envelope</option>
                                        <!-- Envelope options will be populated by JS -->
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-success">Add Income</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        <script src="/src/script.js"></script>
        <script>
            // Show modal when Expenses is clicked
            document.getElementById('add-expense-link').addEventListener('click', function(e) {
                e.preventDefault();
                // Fetch envelopes and populate dropdown
                fetch('/envelopes')
                    .then(response => response.json())
                    .then(data => {
                        const select = document.getElementById('expense-envelope');
                        select.innerHTML = '<option value="">Select envelope</option>';
                        data.forEach(env => {
                            const option = document.createElement('option');
                            option.value = env.id;
                            option.textContent = env.title;
                            select.appendChild(option);
                        });
                        $('#addExpenseModal').modal('show');
                    });
            });

            // Show modal when Income is clicked
            document.getElementById('add-income-link').addEventListener('click', function(e) {
                e.preventDefault();
                // Fetch envelopes and populate dropdown
                fetch('/envelopes')
                    .then(response => response.json())
                    .then(data => {
                        const select = document.getElementById('income-envelope');
                        select.innerHTML = '<option value="">Select envelope</option>';
                        data.forEach(env => {
                            const option = document.createElement('option');
                            option.value = env.id;
                            option.textContent = env.title;
                            select.appendChild(option);
                        });
                        $('#addIncomeModal').modal('show');
                    });
            });

            // Toggle nav visibility on menu icon click
            document.getElementById('menu-toggle').addEventListener('click', function() {
                var nav = document.getElementById('side-nav');
                nav.classList.toggle('hide-nav');
            });

            // Show modal when Edit Envelopes is clicked
            document.querySelectorAll('.nav-link').forEach(function(link) {
                if (link.textContent.trim() === 'Edit Envelopes') {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        // Fetch envelopes and populate modal
                        fetch('/envelopes')
                            .then(response => response.json())
                            .then(data => {
                                const modalList = document.getElementById('modal-envelope-list');
                                modalList.innerHTML = '';
                                data.forEach(env => {
                                    const li = document.createElement('li');
                                    li.className = 'list-group-item d-flex justify-content-between align-items-center';
                                    li.textContent = `${env.title}: $${env.budget}`;
                                    const delBtn = document.createElement('button');
                                    delBtn.className = 'btn btn-danger btn-sm';
                                    delBtn.textContent = 'Delete';
                                    delBtn.onclick = function() {
                                        fetch(`/envelopes/${env.id}`, { method: 'DELETE' })
                                            .then(response => {
                                                if (response.ok) {
                                                    li.remove();
                                                    // Optionally refresh main envelope list
                                                    if (window.fetchAndRenderEnvelopes) window.fetchAndRenderEnvelopes();
                                                } else {
                                                    alert('Failed to delete envelope');
                                                }
                                            });
                                    };
                                    li.appendChild(delBtn);
                                    modalList.appendChild(li);
                                });
                                $('#editEnvelopesModal').modal('show');
                            });
                    });
                }
            });
        </script>
</body>
</html>
